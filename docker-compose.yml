services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-arcane_codex}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-arcane_codex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      - AI_MODE=cpu
      - AI_PROVIDER=${AI_PROVIDER:-local}
      - AI_MODEL_CPU=${AI_MODEL_CPU:-codellama:7b-instruct-q4}
      - AI_MODEL_GPU=${AI_MODEL_GPU:-mistral:7b-instruct}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-700}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.4}
      - AI_RETRAIN_TOKEN=${AI_RETRAIN_TOKEN}
      - AI_TRAINING_DATA_PATH=/data/feedback.jsonl
      - AI_MODEL_REGISTRY_PATH=/data/models.json
    volumes:
      - ai_data:/data
    restart: unless-stopped

  ai-gpu:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    profiles: ["gpu"]
    environment:
      - AI_MODE=gpu
      - AI_PROVIDER=${AI_PROVIDER:-local}
      - AI_MODEL_CPU=${AI_MODEL_CPU:-codellama:7b-instruct-q4}
      - AI_MODEL_GPU=${AI_MODEL_GPU:-mistral:7b-instruct}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-700}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.4}
      - AI_TRAINING_DATA_PATH=/data/feedback.jsonl
      - AI_MODEL_REGISTRY_PATH=/data/models.json
    volumes:
      - ai_data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      # HOST_PORT controls which port on the host machine maps to the app.
      # Set HOST_PORT in a .env file or export it before running `docker compose up`.
      # Defaults to 3000 if not set.
      - "${HOST_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-arcane_codex}?schema=public
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      - GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai:8000}
      - AI_MODE=${AI_MODE:-cpu}
      - AI_PROVIDER=${AI_PROVIDER:-local}
      - AI_MODEL_CPU=${AI_MODEL_CPU:-codellama:7b-instruct-q4}
      - AI_MODEL_GPU=${AI_MODEL_GPU:-mistral:7b-instruct}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-700}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.4}
    restart: unless-stopped

volumes:
  postgres_data:
  ai_data:
